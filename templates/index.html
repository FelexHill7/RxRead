<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RxRead — Doctor Handwriting Recognition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:     #0f1117;
    --paper:   #f5f0e8;
    --cream:   #ede8dc;
    --red:     #c0392b;
    --green:   #27ae60;
    --rule:    rgba(15,17,23,0.12);
    --shadow:  0 2px 24px rgba(15,17,23,0.10);
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Ruled paper lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 31px,
      var(--rule) 31px,
      var(--rule) 32px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Red margin line */
  body::after {
    content: '';
    position: fixed;
    top: 0; bottom: 0;
    left: 72px;
    width: 2px;
    background: rgba(192,57,43,0.25);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 64px 48px 80px 96px;
  }

  header {
    margin-bottom: 56px;
  }

  .rx-symbol {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 4rem;
    color: var(--red);
    line-height: 1;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 0.75rem;
    opacity: 0.5;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed rgba(15,17,23,0.25);
    border-radius: 4px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: rgba(255,255,255,0.4);
    margin-bottom: 24px;
    position: relative;
  }

  .drop-zone.drag-over {
    border-color: var(--red);
    background: rgba(192,57,43,0.04);
  }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .drop-text {
    font-size: 0.8rem;
    opacity: 0.55;
    line-height: 1.8;
  }

  .drop-text strong {
    color: var(--red);
    opacity: 1;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  #file-input { display: none; }

  /* Preview */
  #preview-wrap {
    display: none;
    margin-bottom: 24px;
    background: white;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  #preview-wrap img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    display: block;
    padding: 16px;
  }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, transform 0.1s;
    width: 100%;
    justify-content: center;
    margin-bottom: 32px;
  }

  .btn:hover  { background: #2c3040; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(245,240,232,0.3);
    border-top-color: var(--paper);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  #result-wrap {
    display: none;
    border-top: 1px solid var(--rule);
    padding-top: 32px;
  }

  .result-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.45;
    margin-bottom: 12px;
  }

  .result-text {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1.3;
    letter-spacing: -0.01em;
    word-break: break-word;
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0);   }
  }

  .result-error {
    color: var(--red);
    font-size: 0.85rem;
  }

  .confidence-bar-wrap {
    margin-top: 20px;
  }

  .confidence-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.45;
    margin-bottom: 6px;
  }

  .confidence-track {
    height: 4px;
    background: var(--cream);
    border-radius: 2px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    transition: width 0.6s ease;
    width: 0%;
  }

  /* Reset link */
  .reset-link {
    display: inline-block;
    margin-top: 24px;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.4;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: opacity 0.15s;
  }
  .reset-link:hover { opacity: 0.8; }

  footer {
    font-size: 0.65rem;
    opacity: 0.3;
    margin-top: 64px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="rx-symbol">℞</div>
    <h1>RxRead</h1>
    <p class="subtitle">Doctor Handwriting Recognition</p>
  </header>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">📋</div>
    <p class="drop-text">
      Drag &amp; drop a handwriting image here<br/>
      or <strong id="browse-btn">browse files</strong><br/>
      <span style="font-size:0.65rem;opacity:0.4;margin-top:8px;display:inline-block;">
        Works best with cropped words or short phrases &middot; Full pages are auto-segmented
      </span>
    </p>
    <input type="file" id="file-input" accept="image/*"/>
  </div>

  <!-- Preview -->
  <div id="preview-wrap">
    <img id="preview-img" src="" alt="Preview"/>
  </div>

  <!-- Submit -->
  <button class="btn" id="submit-btn" disabled>
    <div class="spinner" id="spinner"></div>
    <span id="btn-label">Transcribe Handwriting</span>
  </button>

  <!-- Result -->
  <div id="result-wrap">
    <p class="result-label">Transcription</p>
    <p class="result-text" id="result-text"></p>

    <div class="confidence-bar-wrap" id="conf-wrap" style="display:none">
      <p class="confidence-label">Model confidence</p>
      <div class="confidence-track">
        <div class="confidence-fill" id="conf-fill"></div>
      </div>
    </div>

    <span class="reset-link" id="reset-link">↩ Try another image</span>
  </div>

  <footer>Powered by CRNN + CTC · GNHK Dataset</footer>
</div>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const browseBtn  = document.getElementById('browse-btn');
  const previewWrap= document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const submitBtn  = document.getElementById('submit-btn');
  const spinner    = document.getElementById('spinner');
  const btnLabel   = document.getElementById('btn-label');
  const resultWrap = document.getElementById('result-wrap');
  const resultText = document.getElementById('result-text');
  const confWrap   = document.getElementById('conf-wrap');
  const confFill   = document.getElementById('conf-fill');
  const resetLink  = document.getElementById('reset-link');

  let selectedFile = null;

  browseBtn.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  function loadFile(file) {
    selectedFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewWrap.style.display = 'block';
    submitBtn.disabled = false;
    resultWrap.style.display = 'none';
  }

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    submitBtn.disabled = true;
    spinner.style.display = 'block';
    btnLabel.textContent = 'Transcribing...';
    resultWrap.style.display = 'none';

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const res  = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();

      resultText.className = 'result-text';
      if (data.error) {
        resultText.textContent = data.error;
        resultText.classList.add('result-error');
        confWrap.style.display = 'none';
      } else {
        resultText.textContent = data.text || '(no text detected)';
        if (data.confidence !== undefined) {
          confFill.style.width = (data.confidence * 100).toFixed(1) + '%';
          confWrap.style.display = 'block';
        } else {
          confWrap.style.display = 'none';
        }
      }

      resultWrap.style.display = 'block';
    } catch (err) {
      resultText.textContent = 'Server error — is the model loaded?';
      resultText.classList.add('result-error');
      resultWrap.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      spinner.style.display = 'none';
      btnLabel.textContent = 'Transcribe Handwriting';
    }
  });

  resetLink.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    previewWrap.style.display = 'none';
    previewImg.src = '';
    resultWrap.style.display = 'none';
    submitBtn.disabled = true;
  });
</script>
</body>
</html>
